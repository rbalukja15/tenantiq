name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tenantiq
          POSTGRES_PASSWORD: tenantiq
          POSTGRES_DB: tenantiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenantiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Connect as the non-superuser role so RLS is genuinely exercised in CI (ADR-0002); the
      # role is created by the "Create non-superuser app role" step below.
      DATABASE_URL: postgres://tenantiq_app:tenantiq_app@localhost:5432/tenantiq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Provision DB — non-superuser app role + pgvector (ADR-0002, #12)
        # Mirrors infra/postgres/init/{10-app-role,20-vector-extension}.sql, which docker-compose
        # runs on first DB init. RLS enforces only for non-superusers; pgvector 0.8 isn't a trusted
        # extension, so a superuser must install it (in template1 too, so the test DB inherits it).
        run: |
          python - <<'PY'
          import psycopg
          with psycopg.connect("postgres://tenantiq:tenantiq@localhost:5432/tenantiq", autocommit=True) as conn:
              conn.execute("CREATE ROLE tenantiq_app LOGIN PASSWORD 'tenantiq_app' NOSUPERUSER NOBYPASSRLS CREATEDB")
              conn.execute("GRANT ALL ON DATABASE tenantiq TO tenantiq_app")
              conn.execute("ALTER SCHEMA public OWNER TO tenantiq_app")
              conn.execute("CREATE EXTENSION IF NOT EXISTS vector")
          with psycopg.connect("postgres://tenantiq:tenantiq@localhost:5432/template1", autocommit=True) as conn:
              conn.execute("CREATE EXTENSION IF NOT EXISTS vector")
          PY
      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run
      - name: Test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test --if-present
