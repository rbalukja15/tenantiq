services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tenantiq
      POSTGRES_PASSWORD: tenantiq
      POSTGRES_DB: tenantiq
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
